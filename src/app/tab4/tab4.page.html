<ion-header><ion-toolbar color="primary"><ion-title>🛠️ Tab 4: Detalle de Liquidación</ion-title></ion-toolbar></ion-header>
<ion-content class="ion-padding">
  <h3>Resumen y Trabajos Adicionales</h3>
  
  <ion-list lines="inset">
    <ion-item *ngFor="let item of trabajosFinales; let i = index">
      <ion-label class="ion-text-wrap">{{ item.descripcion }} - <strong>${{ item.valor.toFixed(2) }}</strong></ion-label>
      <ion-button slot="end" color="danger" fill="clear" (click)="eliminarTrabajo(i)">Quitar</ion-button>
    </ion-item>
  </ion-list>

  <div style="margin-top: 20px; padding: 10px; border: 1px dashed #7b1fa2; border-radius: 8px;">
    <h5>➕ Agregar Trabajo / Repuesto Extra</h5>
    <ion-item><ion-label position="stacked">Descripción u Observación</ion-label><ion-input type="text" [(ngModel)]="nuevaDescripcion"></ion-input></ion-item>
    <ion-item><ion-label position="stacked">Costo (USD)</ion-label><ion-input type="number" [(ngModel)]="nuevoValor"></ion-input></ion-item>
    <ion-button expand="block" color="secondary" size="small" (click)="agregarTrabajoExtra()">Insertar al Detalle</ion-button>
  </div>

  <div style="text-align: right; margin: 15px 5px; font-size: 18px;">
    <strong>TOTAL ACUMULADO: ${{ totalLiquidacion.toFixed(2) }}</strong>
  </div>

  <ion-button expand="block" color="success" (click)="enviarAFacturacionTab5()">PROCEDER A EMISIÓN (TAB 5)</ion-button>
</ion-content>
